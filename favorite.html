<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erbe Verdi Opinion</title>
    <link rel="stylesheet" href="index.css">
    <link rel="icon" href="icons/mate.png" type="image/png">
</head>
<body>
    <nav class="navbar">
        <div class="brand">
            <h1>Erbe Verdi</h1>
            <img src="icons/matecito.png" alt="Matecito" class="brand-icon">
        </div>
        <div class="nav-buttons">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Buscar yerba por nombre o descripción...">
            </div>
            <a href="favorite.html" class="star-btn">★</a>
            <a href="index.html"><button>Inicio</button></a>
            <a href="us.html"><button>Nosotros</button></a>
            <a href="profile.html"><button>Perfil</button></a>
            <a href="review.html"><button>Reseñas</button></a>
        </div>
    </nav>

    <main>
        <h2>Tus Favoritos</h2>
        <div id="favorites-container" class="cards-container"></div>
        <p id="no-favorites" class="hidden">No tenés productos favoritos todavía.</p>
    </main>

    <script>
        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
        const container = document.getElementById('favorites-container');
        const noFavorites = document.getElementById('no-favorites');
        const searchInput = document.getElementById('search-input');

        function renderFavorites(filter = '') {
            container.innerHTML = '';
            const filtered = favorites.filter(p => 
                p.name.toLowerCase().includes(filter.toLowerCase()) ||
                p.description.toLowerCase().includes(filter.toLowerCase())
            );

            if (filtered.length === 0) {
                noFavorites.classList.remove('hidden');
            } else {
                noFavorites.classList.add('hidden');
                filtered.forEach(product => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${product.image || 'placeholder.jpg'}" alt="${product.name}">
                        <h3>${product.name}</h3>
                        <p>${product.description}</p>
                        <button class="remove-favorite" data-id="${product.id}">★ Quitar</button>
                    `;
                    container.appendChild(card);
                });
            }

            document.querySelectorAll('.remove-favorite').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.dataset.id;
                    favorites = favorites.filter(p => p.id !== id);
                    localStorage.setItem('favorites', JSON.stringify(favorites));
                    renderFavorites(searchInput.value);
                });
            });
        }

        searchInput.addEventListener('input', (e) => {
            renderFavorites(e.target.value);
        });

        renderFavorites();
    </script>
    
</body>
</html>
