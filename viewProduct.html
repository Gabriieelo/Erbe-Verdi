<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erbe Verdi Opinion</title>
    <link rel="stylesheet" href="index.css">
    <link rel="icon" href="icons/mate.png" type="image/png">
</head>
<body>
    <nav class="navbar">
        <div class="brand">
            <h1>Erbe Verdi</h1>
            <img src="icons/mate.png" alt="Matecito" class="brand-icon">
        </div>
        <div class="nav-buttons">
            
            <a href="favorite.html" class="star-btn">★</a>
            <a href="index.html"><button>Inicio</button></a>
            <a href="us.html"><button>Nosotros</button></a>
            <a href="profile.html"><button>Perfil</button></a>
            <a href="review.html"><button>Reseñas</button></a>
            <div id="auth-btn-container"></div>
        </div>
    </nav>
    <div class="container">
        <p>Somos una comunidad donde opinamos de los sabores de las yerbas que se comercializan en Argentina</p>
        <div id="product-detail" class="product-detail-view"></div>
        <a href="index.html" class="back-btn">VOLVER</a>
    </div>
    
    <script>
        // Cargar helper de Supabase
    </script>
    <script src="script.js"></script>

    <div id="logout-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Cerrar Sesión</h3>
            <p>¿Seguro que quieres salir?</p>
            <div class="modal-actions">
                <button id="confirm-logout" class="modal-btn confirm-delete">Sí</button>
                <button id="cancel-logout" class="modal-btn cancel">No</button>
            </div>
        </div>
    </div>
    <script>
        function slugify(text) {
            return text.toString().toLowerCase()
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/(^-|-$)+/g, '');
        }

        function generateStars(rating) {
            if (!rating) return '';
            const fullStars = Math.floor(rating);
            const emptyStars = 5 - fullStars;
            let stars = '';
            for (let i = 0; i < fullStars; i++) {
                stars += '<span class="star filled">★</span>';
            }
            for (let i = 0; i < emptyStars; i++) {
                stars += '<span class="star">★</span>';
            }
            return stars;
        }

        const productSlug = window.location.hash.slice(1);
        const container = document.getElementById('product-detail');

        if (productSlug) {
            getProducts()
                .then(data => {
                    const adminProducts = JSON.parse(localStorage.getItem('admin_products')) || [];
                    const products = [...(data || []), ...adminProducts];
                    const product = products.find(p => slugify(p.name) === productSlug);

                    if (product) {
                        container.innerHTML = `
                            <div class="detail-card">
                                <img src="${product.image || 'placeholder.jpg'}" alt="${product.name}">
                                <h2>${product.name}</h2>
                                <p class="product-description">${product.description}</p>
                                <p class="product-valoracion">Valoración: 
                                <span class="stars-container">
                                    ${generateStars(product.valoracion)}
                                </span>
                                <span>${product.valoracion || 'N/A'}</span>
                            </p>
                                <button class="add-favorite" data-id="${product.id}">★ Agregar a favoritos</button>
                            </div>
                        `;

                        document.querySelector('.add-favorite').addEventListener('click', (e) => {
                            const favorites = JSON.parse(localStorage.getItem('favorites')) || [];
                            if (!favorites.find(p => String(p.id) === String(product.id))) {
                                favorites.push(product);
                                localStorage.setItem('favorites', JSON.stringify(favorites));
                                e.target.textContent = '✓ Agregado';
                            }
                        });
                    } else {
                        container.innerHTML = '<p>Producto no encontrado</p>';
                    }
                })
                .catch(error => {
                    console.error('Error al cargar producto desde Supabase:', error);
                    document.getElementById('product-detail').innerHTML = '<p>Error al cargar producto.</p>';
                });
        } else {
            container.innerHTML = '<p>No se ha seleccionado ningún producto</p>';
        }
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('confirm-logout').addEventListener('click', () => {
                localStorage.removeItem('currentUser');
                window.location.reload();
            });
            document.getElementById('cancel-logout').addEventListener('click', () => {
                document.getElementById('logout-modal').classList.remove('show');
            });
            document.getElementById('logout-modal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) {
                    document.getElementById('logout-modal').classList.remove('show');
                }
            });
        });
    </script>
    
</body>
</html>
