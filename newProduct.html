<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erbe Verdi - Admin</title>
    <link rel="stylesheet" href="index.css">
    <link rel="icon" href="icons/mate.png" type="image/png">
</head>
<body>
    <nav class="navbar">
        <div class="brand">
            <h1>Erbe Verdi</h1>
            <img src="icons/mate.png" alt="Matecito" class="brand-icon">
        </div>
        <div class="nav-buttons">
            <a href="favorite.html" class="star-btn">★</a>
            <a href="index.html"><button>Inicio</button></a>
            <a href="profile.html"><button>Perfil</button></a>
            <a href="us.html"><button>Nosotros</button></a>
            <a href="review.html"><button>Reseñas</button></a>
            <div id="auth-btn-container"></div>
        </div>
    </nav>

    <div class="admin-section">
        <form id="product-form" class="review-form">
            <h2>Agregar Nuevo Producto</h2>

            <div class="form-group hidden">
                <label for="product-id">ID</label>
                <input type="text" id="product-id" readonly>
            </div>

            <div class="form-group">
                <label for="product-name">Nombre del producto</label>
                <input type="text" id="product-name" placeholder="Nombre del producto" required>
            </div>

            <div class="form-group">
                <label for="product-description">Descripción</label>
                <textarea id="product-description" rows="5" placeholder="Describe el producto..." required></textarea>
            </div>

            <div class="form-group">
                <label for="product-image">Imagen del producto</label>
                <input type="file" id="product-image" accept="image/*">
                <div id="image-preview" style="display:none; margin-top:8px;"></div>
            </div>

            <div class="form-group hidden">
                <label for="product-valoracion">Valoración</label>
                <input type="text" id="product-valoracion" readonly>
            </div>

            <button type="submit">Agregar Producto</button>
            <div id="success-msg" class="success-msg">Producto agregado correctamente</div>
        </form>

        <!--
        <div class="products-list" id="admin-products-section">
            <h3>Productos Agregados</h3>
            <div id="admin-products-container">
                <p style="color: #004d00; text-align: center;">No hay productos agregados por el administrador.</p>
            </div>
        </div>
        -->
    </div>

    <script src="script.js"></script>
    <script>
        if (!isAdmin()) {
            window.location.href = 'index.html';
        }

        const STORAGE_KEY = 'admin_products';
        let editingId = null;

        function getNextId(callback) {
            fetch('products.json')
                .then(res => res.json())
                .then(baseProducts => {
                    const adminProducts = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                    const allIds = [
                        ...baseProducts.map(p => parseInt(p.id, 10)),
                        ...adminProducts.map(p => parseInt(p.id, 10))
                    ];
                    const maxId = allIds.length > 0 ? Math.max(...allIds) : 0;
                    callback(String(maxId + 1));
                })
                .catch(() => {
                    const adminProducts = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                    const ids = adminProducts.map(p => parseInt(p.id, 10));
                    const maxId = ids.length > 0 ? Math.max(...ids) : 0;
                    callback(String(maxId + 1));
                });
        }

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('product-form');
            const formTitle = form.querySelector('h2');
            const idInput = document.getElementById('product-id');
            const valoracionInput = document.getElementById('product-valoracion');
            const successMsg = document.getElementById('success-msg');
            const submitBtn = form.querySelector('button[type="submit"]');
            const imageInput = document.getElementById('product-image');
            const imagePreview = document.getElementById('image-preview');

            const params = new URLSearchParams(window.location.search);
            editingId = params.get('id');

            if (editingId) {
                formTitle.textContent = 'Editar Producto';
                submitBtn.textContent = 'Actualizar Producto';
                imageInput.required = false;
                idInput.value = editingId;

                getProduct(editingId).then(product => {
                    if (!product) {
                        alert('Producto no encontrado');
                        window.location.href = 'backoffice.html';
                        return;
                    }
                    document.getElementById('product-name').value = product.name || '';
                    document.getElementById('product-description').value = product.description || '';
                    if (product.image) {
                        imagePreview.innerHTML = `<img src="${product.image}" alt="Vista previa" style="max-width:200px;border-radius:4px;">`;
                        imagePreview.style.display = 'block';
                        imagePreview.dataset.currentImage = product.image;
                    }
                });
            } else {
                getNextId((newId) => {
                    idInput.value = newId;
                });
                valoracionInput.value = '';
            }

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const name = document.getElementById('product-name').value.trim();
                const description = document.getElementById('product-description').value.trim();
                const imageFile = imageInput.files[0];

                if (!name || !description) {
                    alert('Completa todos los campos obligatorios.');
                    return;
                }

                if (!editingId && !imageFile) {
                    alert('Debes seleccionar una imagen.');
                    return;
                }

                let imageUrl;
                if (imageFile) {
                    try {
                        imageUrl = await uploadImage(imageFile);
                    } catch (err) {
                        console.error('Error al subir la imagen:', err);
                        alert('Error al subir la imagen. Intenta de nuevo.');
                        return;
                    }
                } else if (editingId) {
                    imageUrl = imagePreview.dataset.currentImage || '';
                }

                const productData = { name, description, image: imageUrl };

                if (editingId) {
                    try {
                        await updateProduct(editingId, productData);
                        successMsg.textContent = 'Producto actualizado correctamente';
                    } catch (err) {
                        console.warn('Error al actualizar en Supabase:', err);
                        successMsg.textContent = 'Error al actualizar el producto';
                    }
                } else {
                    try {
                        await insertProduct(productData);
                        successMsg.textContent = 'Producto agregado a Supabase correctamente';
                    } catch (err) {
                        console.warn('Error al enviar a Supabase, guardando solo local:', err);
                        const adminProducts = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
                        adminProducts.push({ ...productData, id: idInput.value, valoracion: null });
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(adminProducts));
                        successMsg.textContent = 'Producto guardado localmente (Supabase no disponible)';
                    }

                    form.reset();
                    getNextId((nextId) => {
                        idInput.value = nextId;
                    });
                    valoracionInput.value = '';
                }

                successMsg.classList.add('show');
                setTimeout(() => successMsg.classList.remove('show'), 3000);
            });
        });
    </script>

    <div id="logout-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Cerrar Sesión</h3>
            <p>¿Seguro que quieres salir?</p>
            <div class="modal-actions">
                <button id="confirm-logout" class="modal-btn confirm-delete">Sí</button>
                <button id="cancel-logout" class="modal-btn cancel">No</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('confirm-logout').addEventListener('click', () => {
                localStorage.removeItem('currentUser');
                window.location.reload();
            });
            document.getElementById('cancel-logout').addEventListener('click', () => {
                document.getElementById('logout-modal').classList.remove('show');
            });
            document.getElementById('logout-modal').addEventListener('click', (e) => {
                if (e.target === e.currentTarget) {
                    document.getElementById('logout-modal').classList.remove('show');
                }
            });
        });
    </script>
</body>
</html>
