<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erbe Verdi Opinion</title>
    <link rel="stylesheet" href="index.css">
    <link rel="icon" href="icons/mate.png" type="image/png">
</head>
<body>
    <nav class="navbar">
        <div class="brand">
            <h1>Erbe Verdi</h1>
            <img src="icons/matecito.png" alt="Matecito" class="brand-icon">
        </div>
        <div class="nav-buttons">
            <a href="favorite.html" class="star-btn">★</a>
            <a href="index.html"><button>Inicio</button></a>
            <a href="profile.html"><button>Perfil</button></a>
            <a href="us.html"><button>Nosotros</button></a>
            <a href="review.html"><button>Reseñas</button></a>
        </div>
    </nav>
    <main>
        <form class="review-form" id="user-form">
            <h2>Crear Usuario</h2>
            <div class="form-group">
                <label for="username">Nombre de usuario</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <span id="eye-icon">👁</span>
                    </button>
                </div>
            </div>
            <button type="submit">Crear Usuario</button>
        </form>
    </main>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = '🔒';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = '👁';
            }
        }
    </script>
    <style>
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .password-wrapper input {
            padding-right: 3rem;
            width: 100%;
        }
        
        .toggle-password {
            position: absolute;
            right: 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.25rem;
            color: #006400;
        }
        
        .toggle-password:hover {
            color: #004d00;
        }
    </style>
</body>
</html>
