<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erbe Verdi Opinion</title>
    <link rel="stylesheet" href="index.css">
    <link rel="icon" href="icons/mate.png" type="image/png">
</head>
<body>
    <nav class="navbar">
        <div class="brand">
            <h1>Erbe Verdi</h1>
            <img src="icons/mate.png" alt="Matecito" class="brand-icon">
        </div>
        <div class="nav-buttons">
            <a href="favorite.html" class="star-btn">★</a>
            <a href="index.html"><button>Inicio</button></a>
            <a href="profile.html"><button>Perfil</button></a>
            <a href="us.html"><button>Nosotros</button></a>
            <a href="review.html"><button>Reseñas</button></a>
        </div>
    </nav>
    <main>
        <div class="auth-container">
            <div class="auth-tabs">
                <button id="login-tab" class="auth-tab active" onclick="showTab('login')">Iniciar Sesión</button>
                <button id="register-tab" class="auth-tab" onclick="showTab('register')">Registrarse</button>
            </div>

            <form class="review-form" id="login-form">
                <h2>Iniciar Sesión</h2>
                <div class="form-group">
                    <label for="login-email">Correo electrónico</label>
                    <input type="email" id="login-email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="login-password" name="password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('login-password')">
                            <span class="eye-icon">👁</span>
                        </button>
                    </div>
                </div>
                <button type="submit">Ingresar</button>
                <p id="login-error" class="auth-error hidden"></p>
            </form>

            <form class="review-form" id="register-form">
                <h2>Crear Usuario</h2>
                <div class="form-group">
                    <label for="username">Nombre de usuario</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="register-email">Correo electrónico</label>
                    <input type="email" id="register-email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="register-password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="register-password" name="password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('register-password')">
                            <span class="eye-icon">👁</span>
                        </button>
                    </div>
                </div>
                <button type="submit">Crear Usuario</button>
                <p id="register-error" class="auth-error hidden"></p>
                <p id="register-success" class="auth-success hidden"></p>
            </form>
        </div>
    </main>
    <script src="script.js"></script>
    <script src="user.js"></script>
</body>
</html>
